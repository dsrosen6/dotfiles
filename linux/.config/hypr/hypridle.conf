general {
    lock_cmd = qs -c noctalia-shell ipc call lockScreen lock 
    before_sleep_cmd = loginctl lock-session
}

listener {
    # Suspend after 30 seconds if hyprlock is active. Good for manual
    # locks and accidental wakes.
    timeout = 30
    on-timeout = sh -c 'qs -c noctalia-shell ipc call state all | jq -e ".state.lockScreenActive" && systemctl suspend'
}

listener {
    timeout = 540
    on-timeout = loginctl lock-session
}


listener {
    timeout = 600 # 10 mins
    on-timeout = systemctl suspend
}
